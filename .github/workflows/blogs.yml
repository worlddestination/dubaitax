name: Auto UAE Tax Blogs

on:
  workflow_dispatch:

jobs:
  update-blog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install axios dotenv

      - name: Generate Blogs
        run: node .github/workflows/generateBlogs.js
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}

      - name: Show blogs file
        run: |
          echo "=== blogs.json ==="
          cat blogs.json
